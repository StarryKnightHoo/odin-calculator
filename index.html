<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class = "body">
    <div class = "container">
        <div class = "result"></div>
        <div class = "buttons">
            <button class = "button delete">DEL</button>
            <button class = "button clear">C</button>
            <button class = "button one small-button number">1</button>
            <button class = "button two small-button number">2</button>
            <button class = "button three small-button number">3</button>
            <button class = "button divide small-button operator">÷</button>
            <button class = "button four small-button number">4</button>
            <button class = "button five small-button number">5</button>
            <button class = "button six small-button number">6</button>
            <button class = "button multiply small-button operator">×</button>
            <button class = "button seven small-button number">7</button>
            <button class = "button eight small-button number">8</button>
            <button class = "button nine small-button number">9</button>
            <button class = "button plus small-button operator">+</button>
            <button class = "button equals small-button">=</button>
            <button class = "button zero small-button number">0</button>
            <button class = "button decimal small-button">.</button>
            <button class = "button subtract small-button operator">-</button>
    </div>

</body>
</html>
