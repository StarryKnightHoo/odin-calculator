<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "title"></div>
    <div class = "container">
        <div class = "result"></div>
        <div class = "buttons">
            <button class = "delete"></button>
            <button class = "clear"></button>
            <button class = "one"></button>
            <button class = "two"></button>
            <button class = "three"></button>
            <button class = "divide"></button>
            <button class = "four"></button>
            <button class = "five"></button>
            <button class = "six"></button>
            <button class = "multiply"></button>
            <button class = "seven"></button>
            <button class = "eight"></button>
            <button class = "nine"></button>
            <button class = "plus"></button>
            <button class = "equals"></button>
            <button class = "zero"></button>
            <button class = "decimal"></button>
            <button class = "subtract"></button>
    </div>

</body>
</html>
