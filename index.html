<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class = "body">
    <div class = "container">
        <div class = "result"></div>
        <div class = "buttons">
            <button class = "delete">DEL</button>
            <button class = "clear">C</button>
            <button class = "one small-button number">1</button>
            <button class = "two small-button number">2</button>
            <button class = "three small-button number">3</button>
            <button class = "divide small-button operator">÷</button>
            <button class = "four small-button number">4</button>
            <button class = "five small-button number">5</button>
            <button class = "six small-button number">6</button>
            <button class = "multiply small-button operator">×</button>
            <button class = "seven small-button number">7</button>
            <button class = "eight small-button number">8</button>
            <button class = "nine small-button number">9</button>
            <button class = "plus small-button operator">+</button>
            <button class = "equals small-button">=</button>
            <button class = "zero small-button number">0</button>
            <button class = "decimal small-button">.</button>
            <button class = "subtract small-button operator">-</button>
    </div>

</body>
</html>
